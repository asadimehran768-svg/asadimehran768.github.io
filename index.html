<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>سایت پیروزی</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #667eea, #764ba2);
      font-family: Tahoma;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      text-align: center;
    }

    .box {
      background: rgba(255,255,255,0.1);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 50px;
      margin-bottom: 20px;
    }

    p {
      font-size: 24px;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      background: white;
      color: #764ba2;
      font-size: 18px;
      cursor: pointer;
    }

    button:hover {
      transform: scale(1.05);
    }
  </style>

</head>
<body>

  <div class="box">
    <h1>سلام 👋</h1>
    <p>به سایت من خوش آمدید 😄</p>

    <button onclick="alert('خوش اومدی 😎')">
      کلیک کن
    </button>
  </div>

</body>
</html>
